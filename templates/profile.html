{% extends 'layout.html' %}
{% block content %}
    <style>
        
        .profile-container {
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 8px 0 18px rgba(0, 0, 0, 0.1), -8px 0 18px rgba(0, 0, 0, 0.1); /* left & right shadow only */
            text-align: center;
        
            display: flex;
            flex-direction: column;
            gap: 20px; /* space between children */
            box-sizing: border-box;
        }
        
        .profile-container h2 {
            font-size: 35px;
            font-weight: bold;
            color: #5d78bd;
            margin-bottom: 10px;
        }
        
        .profile-container p {
            font-size: 18px;
            color: #555;
            margin: 0;
        }
        
    </style>
<main class="container text-center">
    <div class="profile-container">
        <h2>Profile</h2>
        <p><strong>Username:</strong> {{ user[1] }}</p>
        <p><strong>Email:</strong> {{ user[2] }}</p>
        <a href="{{ url_for('edit_profile') }}" class="btn-b">Edit Profile</a>
    </div>
</main>
    

    {% endblock %}
